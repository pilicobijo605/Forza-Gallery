<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfil — Forza Gallery</title>
  <link rel="stylesheet" href="/css/style.css?v=6" />
</head>
<body>

  <nav class="navbar">
    <a href="/index.html" class="navbar-brand">FORZA<span class="brand-dot"></span>GALLERY</a>
    <ul class="navbar-links" id="nav-auth"></ul>
  </nav>

  <div class="teal-divider"></div>

  <main>
    <div id="perfil-loading" class="state-box" style="padding:5rem 1rem">
      <span class="state-icon">⏳</span><p>Cargando perfil...</p>
    </div>

    <div id="perfil-privado" class="state-box" style="display:none;padding:5rem 1rem">
      <span class="state-icon">🔒</span><p>Este perfil es privado.</p>
    </div>

    <div id="perfil-notfound" class="state-box" style="display:none;padding:5rem 1rem">
      <span class="state-icon">🏎</span><p>Usuario no encontrado.</p>
    </div>

    <div id="perfil-content" style="display:none">
      <div class="perfil-header">
        <div class="perfil-avatar-wrap">
          <img id="perfil-avatar" src="/img/default-avatar.svg" alt="Avatar" class="perfil-avatar" />
        </div>
        <div class="perfil-info">
          <div class="perfil-info-top">
            <h1 class="perfil-username" id="perfil-username"></h1>
            <a href="/ajustes.html" class="perfil-settings-btn" id="perfil-settings-btn" style="display:none" title="Ajustes de cuenta">⚙</a>
          </div>
          <p class="perfil-bio" id="perfil-bio"></p>
          <div class="perfil-stats">
            <span class="perfil-stat-btn no-click"><strong id="perfil-count-num">0</strong><span>fotos</span></span>
            <button class="perfil-stat-btn" id="btn-seguidores"><strong id="perfil-seguidores-num">0</strong><span>seguidores</span></button>
            <button class="perfil-stat-btn" id="btn-siguiendo"><strong id="perfil-siguiendo-num">0</strong><span>siguiendo</span></button>
          </div>
          <div class="perfil-meta"><span id="perfil-fecha"></span></div>
          <div id="perfil-actions" style="display:none;margin-top:0.75rem">
            <a href="/editar-perfil.html" class="btn btn-primary">Editar perfil</a>
          </div>
          <div class="perfil-follow-actions" id="perfil-follow-actions" style="display:none">
            <button class="follow-btn" id="btn-seguir">Seguir</button>
            <button class="favorito-btn" id="btn-favorito" title="Añadir a favoritos">⭐</button>
            <a class="msg-btn" id="btn-mensaje" href="#">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              Mensaje
            </a>
          </div>
        </div>
      </div>

      <div class="perfil-tabs" id="perfil-tabs">
        <button class="perfil-tab active" id="tab-btn-fotos" data-tab="fotos">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
            <rect x="3" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
            <rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
        </button>
        <button class="perfil-tab" id="tab-btn-guardados" data-tab="guardados" style="display:none">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
          </svg>
        </button>
        <button class="perfil-tab" id="tab-btn-favoritos" data-tab="favoritos" style="display:none">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        </button>
      </div>

      <div class="teal-divider" style="margin:0"></div>

      <div class="perfil-tabs-slider">
        <div class="perfil-tabs-track" id="perfil-tabs-track">
          <div class="perfil-tab-panel">
            <div class="gallery-grid" id="perfil-gallery"></div>
          </div>
          <div class="perfil-tab-panel">
            <div class="gallery-grid" id="guardados-grid"></div>
          </div>
          <div class="perfil-tab-panel">
            <div class="favoritos-grid" id="favoritos-grid"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div class="avatar-zoom-overlay" id="avatar-zoom">
    <img id="avatar-zoom-img" src="" alt="Avatar" />
  </div>

  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lb-close">✕</button>
    <div class="lb-panel">
      <div class="lb-header">
        <div class="lb-title-bar" id="lb-title"></div>
        <button class="lb-date" id="lb-date"></button>
      </div>
      <div class="lb-img-wrap">
        <img id="lb-img" src="" alt="" />
      </div>
      <div class="lb-info-bar">
        <div class="lb-info-left">
          <span class="juego-badge" id="lb-juego"></span>
          <div class="tags-row" id="lb-tags"></div>
          <a class="lb-username" id="lb-username" href="#"></a>
          <p class="lb-desc" id="lb-desc"></p>
        </div>
        <div class="lb-info-right">
          <div class="lb-actions">
            <button class="lb-action-btn" id="lb-like-btn" title="Like">
              <span class="lb-action-icon">♡</span><span id="lb-like-count">0</span>
            </button>
            <button class="lb-action-btn" id="lb-save-btn" title="Guardar">
              <span class="lb-action-icon">🔖</span>
            </button>
            <button class="lb-action-btn" id="lb-comment-btn" title="Comentarios">
              <span class="lb-action-icon">💬</span><span id="lb-comment-count">0</span>
            </button>
            <button class="lb-action-btn" id="lb-edit-toggle" style="display:none" title="Editar">✏️</button>
            <span class="lb-action-stat" title="Visitas">
              <span class="lb-action-icon">👁</span><span id="lb-views-count">0</span>
            </span>
            <div class="lb-share-wrap" id="lb-share-wrap">
              <button class="lb-action-btn" id="lb-share-btn" title="Compartir">
                <span class="lb-action-icon">↗</span>
              </button>
              <div class="lb-share-menu" id="lb-share-menu" style="display:none">
                <a class="lb-share-item" id="lb-share-wa" href="#" target="_blank" rel="noopener noreferrer">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413z"/><path d="M12 2C6.477 2 2 6.477 2 12c0 1.89.525 3.66 1.438 5.168L2 22l4.988-1.31A9.945 9.945 0 0012 22c5.523 0 10-4.477 10-10S17.523 2 12 2z"/></svg>
                  <span>WhatsApp</span>
                </a>
                <a class="lb-share-item" id="lb-share-tw" href="#" target="_blank" rel="noopener noreferrer">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.259 5.629L18.244 2.25zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77z"/></svg>
                  <span>Twitter / X</span>
                </a>
                <button class="lb-share-item" id="lb-share-copy">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                  <span>Copiar enlace</span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="lb-edit-form" id="lb-edit-form" style="display:none">
        <input class="lb-edit-input" id="lb-edit-titulo" placeholder="Título" maxlength="200" />
        <div class="lb-edit-row">
          <select class="lb-edit-select" id="lb-edit-juego">
            <option value="FH1">FH1</option>
            <option value="FH2">FH2</option>
            <option value="FH3">FH3</option>
            <option value="FH4">FH4</option>
            <option value="FH5">FH5</option>
          </select>
          <input class="lb-edit-input" id="lb-edit-tags" placeholder="Tags (separados por espacio)" />
        </div>
        <textarea class="lb-edit-textarea" id="lb-edit-desc" placeholder="Descripción (opcional)" maxlength="500"></textarea>
        <div class="lb-edit-actions">
          <button class="lb-edit-btn lb-edit-btn-cancel" id="lb-edit-cancel">Cancelar</button>
          <button class="lb-edit-btn lb-edit-btn-save" id="lb-edit-save">Guardar</button>
        </div>
      </div>

      <div class="lb-comments" id="lb-comments">
        <div class="lb-comments-list" id="lb-comments-list"></div>
        <div class="lb-comment-form" id="lb-comment-form" style="display:none">
          <input class="lb-comment-input" id="lb-comment-input" placeholder="Añadir comentario..." maxlength="500" />
          <button class="lb-comment-submit" id="lb-comment-submit">Enviar</button>
        </div>
        <p class="lb-login-hint" id="lb-login-hint" style="display:none">
          <a href="/login.html">Inicia sesión</a> para comentar, dar like o guardar
        </p>
      </div>
    </div>
  </div>

  <div class="user-modal-overlay" id="user-modal" style="display:none">
    <div class="user-modal-box">
      <div class="user-modal-header">
        <span id="user-modal-title"></span>
        <button class="user-modal-close" id="user-modal-close">✕</button>
      </div>
      <div class="user-modal-list" id="user-modal-list"></div>
    </div>
  </div>

  <div class="teal-divider" style="margin-top:auto"></div>
  <footer class="footer">Forza Gallery &nbsp;·&nbsp; Comunidad Forza Horizon</footer>

  <script src="/js/api.js?v=2"></script>
  <script src="/js/toast.js"></script>
  <script>
    updateNavAuth();

    const username = new URLSearchParams(location.search).get("u");

    if (!username) {
      window.location.href = "/galeria.html";
    }

    async function loadPerfil() {
      try {
        const perfil = await apiFetch(`/usuarios/${username}`);
        const imagenes = await apiFetch(`/imagenes?usuario=${username}&limit=60`);

        document.getElementById("perfil-loading").style.display = "none";
        document.getElementById("perfil-content").style.display = "block";

        const avatarEl = document.getElementById("perfil-avatar");
        avatarEl.style.cursor = "zoom-in";
        avatarEl.addEventListener("click", () => {
          document.getElementById("avatar-zoom-img").src = avatarEl.src;
          avatarZoom.classList.add("open");
        });

        document.title = `${perfil.username} — Forza Gallery`;
        document.getElementById("perfil-username").textContent = `@${perfil.username}`;
        document.getElementById("perfil-bio").textContent = perfil.bio || "";

        const avatar = document.getElementById("perfil-avatar");
        if (perfil.avatar_url) avatar.src = perfil.avatar_url;

        const joined = new Date(perfil.created_at).toLocaleDateString("es-ES", { month: "long", year: "numeric" });
        document.getElementById("perfil-fecha").textContent = `Miembro desde ${joined}`;
        document.getElementById("perfil-count-num").textContent = imagenes.length;
        document.getElementById("perfil-seguidores-num").textContent = perfil.seguidores ?? 0;
        document.getElementById("perfil-siguiendo-num").textContent = perfil.siguiendo ?? 0;

        if (isLoggedIn()) {
          try { meUser = await fetchMe(); } catch {}
        }
        if (meUser && meUser.username === username) {
          document.getElementById("perfil-actions").style.display = "block";
          document.getElementById("perfil-settings-btn").style.display = "flex";
          document.getElementById("tab-btn-guardados").style.display = "flex";
          document.getElementById("tab-btn-favoritos").style.display = "flex";
          loadGuardados();
          loadFavoritos();
        } else if (meUser) {
          const fa = document.getElementById("perfil-follow-actions");
          fa.style.display = "flex";
          const btnSeguir = document.getElementById("btn-seguir");
          if (perfil.yo_sigo) { btnSeguir.textContent = "Siguiendo"; btnSeguir.classList.add("siguiendo"); }
          if (perfil.es_favorito) document.getElementById("btn-favorito").classList.add("active");
          document.getElementById("btn-mensaje").href = `/mensajes.html?u=${username}`;
        }

        const grid = document.getElementById("perfil-gallery");
        if (!imagenes.length) {
          grid.innerHTML = `<div class="state-box"><span class="state-icon">📷</span><p>Aún no hay fotos.</p></div>`;
          return;
        }

        grid.innerHTML = imagenes.map((img, i) => `
          <div class="img-card fade-in" style="animation-delay:${i*0.03}s" data-id="${img.id}">
            <img class="img-thumb" src="${img.filename}" alt="${img.titulo}" loading="lazy" onerror="this.style.display='none'">
            <div class="card-overlay">
              <div class="img-meta">
                <span class="juego-badge ${img.juego}">${img.juego}</span>
              </div>
              <div class="img-title">${img.titulo}</div>
              <div class="img-bottom-row">
                <div class="tags-row">${(img.tags||[]).map(t=>`<span class="hashtag">#${t}</span>`).join("")}</div>
              </div>
            </div>
          </div>
        `).join("");

        grid.querySelectorAll(".img-card").forEach(card => {
          card.addEventListener("click", async () => {
            try {
              const img = await fetchImagen(card.dataset.id);
              openLightbox(img);
            } catch {}
          });
        });

      } catch(e) {
        document.getElementById("perfil-loading").style.display = "none";
        if (e.message.includes("privado")) {
          document.getElementById("perfil-privado").style.display = "flex";
        } else {
          document.getElementById("perfil-notfound").style.display = "flex";
        }
      }
    }

    const avatarZoom = document.getElementById("avatar-zoom");
    avatarZoom.addEventListener("click", () => avatarZoom.classList.remove("open"));

    let currentLbId = null;
    let currentLbData = null;
    let meUser = null;

    function openLightbox(img) {
      currentLbId = img.id;
      currentLbData = img;

      document.getElementById("lb-img").src = img.filename;
      document.getElementById("lb-img").alt = img.titulo;
      document.getElementById("lb-title").textContent = img.titulo;
      document.getElementById("lb-desc").textContent = img.descripcion || "";

      const badge = document.getElementById("lb-juego");
      badge.textContent = img.juego;
      badge.className = `juego-badge ${img.juego}`;

      const lbTags = document.getElementById("lb-tags");
      lbTags.innerHTML = (img.tags||[]).map(t=>`<span class="hashtag" data-tag="${t}">#${t}</span>`).join("");
      lbTags.querySelectorAll(".hashtag").forEach(el =>
        el.addEventListener("click", () => window.location.href = `/galeria.html?tag=${el.dataset.tag}`)
      );

      const d = new Date(img.created_at);
      const dateOnly = d.toISOString().split("T")[0];
      const dateEl = document.getElementById("lb-date");
      dateEl.textContent =
        d.toLocaleDateString("es-ES",{day:"2-digit",month:"short",year:"numeric"}) + " · " +
        d.toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"});
      dateEl.onclick = () => window.location.href = `/galeria.html?fecha=${dateOnly}`;

      const editToggle = document.getElementById("lb-edit-toggle");
      editToggle.style.display = (meUser && meUser.id === img.usuario_id) ? "flex" : "none";
      document.getElementById("lb-edit-form").style.display = "none";
      editToggle.classList.remove("active");

      document.getElementById("lb-views-count").textContent = img.visitas ?? 0;
      document.getElementById("lb-share-menu").style.display = "none";
      document.getElementById("lb-like-count").textContent = "0";
      document.getElementById("lb-like-btn").className = "lb-action-btn";
      document.getElementById("lb-save-btn").className = "lb-action-btn";
      document.getElementById("lb-comments-list").innerHTML = "";
      const inp = document.getElementById("lb-comment-input");
      if (inp) inp.value = "";

      document.getElementById("lightbox").classList.add("open");
      loadLbSocial(img.id);
    }

    function closeLightbox() {
      document.getElementById("lightbox").classList.remove("open");
      document.getElementById("lb-edit-form").style.display = "none";
      document.getElementById("lb-edit-toggle").classList.remove("active");
      document.getElementById("lb-share-menu").style.display = "none";
      currentLbId = null;
      currentLbData = null;
    }

    function updateLikeBtn(liked, count) {
      const btn = document.getElementById("lb-like-btn");
      btn.className = "lb-action-btn" + (liked ? " liked" : "");
      btn.querySelector(".lb-action-icon").textContent = liked ? "♥" : "♡";
      document.getElementById("lb-like-count").textContent = count;
    }

    const EMOJIS = ["❤️","😂","😮","👍","🔥"];

    function renderComentarios(comentarios, imagenId) {
      const list = document.getElementById("lb-comments-list");
      document.getElementById("lb-comment-count").textContent = comentarios.length;
      if (!comentarios.length) { list.innerHTML = ""; return; }

      list.innerHTML = comentarios.map(c => {
        const reacciones = EMOJIS.map(e => {
          const count = (c.reacciones && c.reacciones[e]) || 0;
          const active = c.mi_reaccion === e ? " active" : "";
          return `<button class="lb-reaction-btn${active}" data-cid="${c.id}" data-emoji="${e}">
            ${e}<span class="lb-reaction-count">${count || ""}</span>
          </button>`;
        }).join("");

        return `
          <div class="lb-comment-item" data-id="${c.id}">
            <div class="lb-comment-body">
              <div class="lb-comment-header">
                <a class="lb-comment-author" href="/perfil.html?u=${c.username}">${c.username}</a>
                <span class="lb-comment-time">${timeAgo(c.created_at)}</span>
              </div>
              <span class="lb-comment-text">${c.contenido.replace(/</g,"&lt;")}</span>
              <div class="lb-reactions">${reacciones}</div>
            </div>
            <div class="lb-comment-actions">
              ${meUser && meUser.id === c.usuario_id
                ? `<button class="lb-comment-action delete" data-id="${c.id}" title="Eliminar">🗑</button>`
                : (meUser
                    ? `<button class="lb-comment-action report" data-id="${c.id}" title="Reportar">⚑</button>`
                    : "")}
            </div>
          </div>`;
      }).join("");

      list.querySelectorAll(".lb-reaction-btn").forEach(btn =>
        btn.addEventListener("click", async () => {
          if (!isLoggedIn()) { showToast("Inicia sesión para reaccionar", "info"); return; }
          try {
            await reaccionar(btn.dataset.cid, btn.dataset.emoji);
            const cs = await getComentarios(imagenId);
            renderComentarios(cs, imagenId);
          } catch(e) { showToast(e.message, "error"); }
        })
      );
      list.querySelectorAll(".delete").forEach(btn =>
        btn.addEventListener("click", async () => {
          try {
            await deleteComentario(btn.dataset.id);
            const cs = await getComentarios(imagenId);
            renderComentarios(cs, imagenId);
          } catch(e) { showToast(e.message, "error"); }
        })
      );
      list.querySelectorAll(".report").forEach(btn =>
        btn.addEventListener("click", async () => {
          try {
            await reportarComentario(btn.dataset.id);
            showToast("Comentario reportado", "info");
            btn.disabled = true;
          } catch(e) { showToast(e.message, "error"); }
        })
      );
    }

    const TAB_ORDER = ["fotos", "guardados", "favoritos"];
    document.querySelectorAll(".perfil-tab").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".perfil-tab").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        const idx = TAB_ORDER.indexOf(btn.dataset.tab);
        document.getElementById("perfil-tabs-track").style.transform = `translateX(-${idx * 33.333}%)`;
      });
    });

    async function loadLbSocial(imagenId) {
      try {
        const likes = await getLikes(imagenId);
        updateLikeBtn(likes.liked, likes.count);
      } catch {}
      try {
        const cs = await getComentarios(imagenId);
        renderComentarios(cs, imagenId);
      } catch {}

      const commentForm = document.getElementById("lb-comment-form");
      const loginHint   = document.getElementById("lb-login-hint");
      if (isLoggedIn()) {
        commentForm.style.display = "flex";
        loginHint.style.display   = "none";
      } else {
        commentForm.style.display = "none";
        loginHint.style.display   = "block";
      }

      if (isLoggedIn()) {
        try {
          const guardados = await getMisGuardados();
          const saved = guardados.some(g => g.id === imagenId);
          document.getElementById("lb-save-btn").className = "lb-action-btn" + (saved ? " saved" : "");
        } catch {}
      }
    }

    document.getElementById("lb-like-btn").addEventListener("click", async () => {
      if (!isLoggedIn()) { showToast("Inicia sesión para dar like", "info"); return; }
      try {
        const res = await toggleLike(currentLbId);
        updateLikeBtn(res.liked, res.count);
      } catch(e) { showToast(e.message, "error"); }
    });

    document.getElementById("lb-save-btn").addEventListener("click", async () => {
      if (!isLoggedIn()) { showToast("Inicia sesión para guardar", "info"); return; }
      try {
        const res = await toggleGuardado(currentLbId);
        document.getElementById("lb-save-btn").className = "lb-action-btn" + (res.guardado ? " saved" : "");
        showToast(res.guardado ? "Guardado" : "Eliminado de guardados", res.guardado ? "success" : "info");
        if (meUser && meUser.username === username) loadGuardados();
      } catch(e) { showToast(e.message, "error"); }
    });

    document.getElementById("lb-comment-btn").addEventListener("click", () => {
      document.getElementById("lb-comment-input")?.focus();
    });

    document.getElementById("lb-comment-submit").addEventListener("click", async () => {
      const input = document.getElementById("lb-comment-input");
      const contenido = input.value.trim();
      if (!contenido) return;
      try {
        await addComentario(currentLbId, contenido);
        input.value = "";
        const cs = await getComentarios(currentLbId);
        renderComentarios(cs, currentLbId);
        const list = document.getElementById("lb-comments-list");
        list.scrollTop = list.scrollHeight;
      } catch(e) { showToast(e.message, "error"); }
    });

    document.getElementById("lb-comment-input")?.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        document.getElementById("lb-comment-submit").click();
      }
    });

    document.getElementById("lb-close").addEventListener("click", closeLightbox);
    document.getElementById("lightbox").addEventListener("click", (e) => {
      if (e.target === document.getElementById("lightbox")) closeLightbox();
    });

    document.getElementById("lb-edit-toggle").addEventListener("click", () => {
      if (!currentLbData) return;
      const form = document.getElementById("lb-edit-form");
      const visible = form.style.display !== "none";
      if (visible) {
        form.style.display = "none";
        document.getElementById("lb-edit-toggle").classList.remove("active");
      } else {
        document.getElementById("lb-edit-titulo").value = currentLbData.titulo || "";
        document.getElementById("lb-edit-juego").value = currentLbData.juego || "FH5";
        document.getElementById("lb-edit-tags").value = (currentLbData.tags || []).join(" ");
        document.getElementById("lb-edit-desc").value = currentLbData.descripcion || "";
        form.style.display = "flex";
        document.getElementById("lb-edit-toggle").classList.add("active");
      }
    });

    document.getElementById("lb-edit-cancel").addEventListener("click", () => {
      document.getElementById("lb-edit-form").style.display = "none";
      document.getElementById("lb-edit-toggle").classList.remove("active");
    });

    document.getElementById("lb-edit-save").addEventListener("click", async () => {
      if (!currentLbId) return;
      const titulo = document.getElementById("lb-edit-titulo").value.trim();
      const juego  = document.getElementById("lb-edit-juego").value;
      const tags   = document.getElementById("lb-edit-tags").value.trim();
      const desc   = document.getElementById("lb-edit-desc").value.trim();
      if (!titulo) { showToast("El título no puede estar vacío", "error"); return; }
      try {
        const updated = await updateImagen(currentLbId, { titulo, juego, descripcion: desc || null, tags });
        currentLbData = updated;
        document.getElementById("lb-title").textContent = updated.titulo;
        document.getElementById("lb-desc").textContent = updated.descripcion || "";
        const badge = document.getElementById("lb-juego");
        badge.textContent = updated.juego;
        badge.className = `juego-badge ${updated.juego}`;
        const lbTags = document.getElementById("lb-tags");
        lbTags.innerHTML = (updated.tags||[]).map(t=>`<span class="hashtag" data-tag="${t}">#${t}</span>`).join("");
        lbTags.querySelectorAll(".hashtag").forEach(el =>
          el.addEventListener("click", () => window.location.href = `/galeria.html?tag=${el.dataset.tag}`)
        );
        document.getElementById("lb-edit-form").style.display = "none";
        document.getElementById("lb-edit-toggle").classList.remove("active");
        showToast("Imagen actualizada", "success");
        loadPerfil();
      } catch(e) { showToast(e.message, "error"); }
    });

    async function loadGuardados() {
      const grid = document.getElementById("guardados-grid");
      try {
        const imagenes = await getMisGuardados();
        if (!imagenes.length) {
          grid.innerHTML = `<div class="state-box"><span class="state-icon">🔖</span><p>Aún no has guardado ninguna imagen.</p></div>`;
          return;
        }
        grid.innerHTML = imagenes.map((img, i) => `
          <div class="img-card fade-in" style="animation-delay:${i*0.03}s" data-id="${img.id}">
            <img class="img-thumb" src="${img.filename}" alt="${img.titulo}" loading="lazy" onerror="this.style.display='none'">
            <div class="card-overlay">
              <div class="img-meta"><span class="juego-badge ${img.juego}">${img.juego}</span></div>
              <div class="img-title">${img.titulo}</div>
            </div>
          </div>
        `).join("");
        grid.querySelectorAll(".img-card").forEach(card => {
          card.addEventListener("click", async () => {
            try { const img = await fetchImagen(card.dataset.id); openLightbox(img); } catch {}
          });
        });
      } catch {
        grid.innerHTML = `<div class="state-box"><span class="state-icon">🔖</span><p>Aún no has guardado ninguna imagen.</p></div>`;
      }
    }

    document.getElementById("btn-seguir")?.addEventListener("click", async () => {
      if (!isLoggedIn()) { window.location.href = "/login.html"; return; }
      try {
        const res = await toggleSeguir(username);
        const btn = document.getElementById("btn-seguir");
        if (res.siguiendo) { btn.textContent = "Siguiendo"; btn.classList.add("siguiendo"); }
        else { btn.textContent = "Seguir"; btn.classList.remove("siguiendo"); }
        const perfil = await apiFetch(`/usuarios/${username}`);
        document.getElementById("perfil-seguidores-num").textContent = perfil.seguidores;
      } catch(e) { showToast(e.message, "error"); }
    });

    document.getElementById("btn-favorito")?.addEventListener("click", async () => {
      if (!isLoggedIn()) { window.location.href = "/login.html"; return; }
      try {
        const res = await toggleFavoritoUsuario(username);
        const btn = document.getElementById("btn-favorito");
        btn.classList.toggle("active", res.es_favorito);
        showToast(res.es_favorito ? "Añadido a favoritos" : "Eliminado de favoritos", res.es_favorito ? "success" : "info");
      } catch(e) { showToast(e.message, "error"); }
    });

    async function openUserModal(titulo, loadFn) {
      document.getElementById("user-modal-title").textContent = titulo;
      document.getElementById("user-modal-list").innerHTML = `<div class="state-box" style="padding:2rem"><span class="state-icon">⏳</span></div>`;
      document.getElementById("user-modal").style.display = "flex";
      const users = await loadFn().catch(() => []);
      const list = document.getElementById("user-modal-list");
      if (!users.length) {
        list.innerHTML = `<div class="state-box" style="padding:2rem"><p>Sin resultados</p></div>`;
        return;
      }
      list.innerHTML = users.map(u => `
        <div class="user-modal-item">
          <img class="user-modal-avatar" src="${u.avatar_url || "/img/default-avatar.svg"}" alt="${u.username}" onerror="this.src='/img/default-avatar.svg'" />
          <div class="user-modal-info">
            <a class="user-modal-username" href="/perfil.html?u=${u.username}">@${u.username}</a>
            <span class="user-modal-bio">${u.bio || ""}</span>
          </div>
          ${meUser && meUser.username !== u.username ? `
            <button class="user-modal-follow-btn ${u.yo_sigo ? "siguiendo" : ""}" data-username="${u.username}">
              ${u.yo_sigo ? "Siguiendo" : "Seguir"}
            </button>` : ""}
        </div>`).join("");
      list.querySelectorAll(".user-modal-follow-btn").forEach(btn =>
        btn.addEventListener("click", async () => {
          try {
            const res = await toggleSeguir(btn.dataset.username);
            btn.textContent = res.siguiendo ? "Siguiendo" : "Seguir";
            btn.classList.toggle("siguiendo", res.siguiendo);
          } catch(e) { showToast(e.message, "error"); }
        })
      );
    }

    document.getElementById("btn-seguidores").addEventListener("click", () =>
      openUserModal("Seguidores", () => getSeguidores(username))
    );
    document.getElementById("btn-siguiendo").addEventListener("click", () =>
      openUserModal("Siguiendo", () => getSiguiendo(username))
    );
    document.getElementById("user-modal-close").addEventListener("click", () => {
      document.getElementById("user-modal").style.display = "none";
    });
    document.getElementById("user-modal").addEventListener("click", (e) => {
      if (e.target === document.getElementById("user-modal"))
        document.getElementById("user-modal").style.display = "none";
    });

    async function loadFavoritos() {
      const grid = document.getElementById("favoritos-grid");
      try {
        const users = await getMisFavoritosUsuarios();
        if (!users.length) {
          grid.innerHTML = `<div class="state-box"><span class="state-icon">⭐</span><p>Aún no tienes usuarios favoritos.</p></div>`;
          return;
        }
        grid.innerHTML = users.map(u => `
          <a class="favorito-user-card" href="/perfil.html?u=${u.username}">
            <img src="${u.avatar_url || "/img/default-avatar.svg"}" alt="${u.username}" onerror="this.src='/img/default-avatar.svg'" />
            <div class="favorito-user-card-info">
              <span class="favorito-user-card-name">@${u.username}</span>
              <span class="favorito-user-card-bio">${u.bio || ""}</span>
            </div>
          </a>`).join("");
      } catch {
        grid.innerHTML = `<div class="state-box"><span class="state-icon">⭐</span><p>Aún no tienes usuarios favoritos.</p></div>`;
      }
    }

    document.getElementById("lb-share-btn").addEventListener("click", (e) => {
      e.stopPropagation();
      const menu = document.getElementById("lb-share-menu");
      const opening = menu.style.display === "none";
      menu.style.display = opening ? "flex" : "none";
      if (opening && currentLbId) {
        const url   = `${location.origin}/galeria.html?id=${currentLbId}`;
        const title = currentLbData?.titulo || "Forza Gallery";
        document.getElementById("lb-share-wa").href =
          `https://wa.me/?text=${encodeURIComponent(title + " — " + url)}`;
        document.getElementById("lb-share-tw").href =
          `https://x.com/intent/tweet?text=${encodeURIComponent(title)}&url=${encodeURIComponent(url)}`;
      }
    });

    document.getElementById("lb-share-copy").addEventListener("click", async () => {
      const url = `${location.origin}/galeria.html?id=${currentLbId}`;
      document.getElementById("lb-share-menu").style.display = "none";
      try {
        await navigator.clipboard.writeText(url);
        showToast("¡Enlace copiado!", "success");
      } catch {
        showToast("No se pudo copiar el enlace", "error");
      }
    });

    document.addEventListener("click", (e) => {
      if (!e.target.closest("#lb-share-wrap")) {
        const menu = document.getElementById("lb-share-menu");
        if (menu) menu.style.display = "none";
      }
    });

    loadPerfil();
  </script>
</body>
</html>
