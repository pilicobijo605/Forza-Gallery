<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Forza Gallery</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <nav class="navbar">
    <a href="/index.html" class="navbar-brand">FORZA<span class="brand-dot"></span>GALLERY</a>
    <ul class="navbar-links">
      <li><a href="/galeria.html">Galería</a></li>
    </ul>
  </nav>

  <div class="teal-divider"></div>

  <div class="auth-container">
    <div class="auth-card">
      <div class="form-header">
        <h1 class="form-title">Login</h1>
        <p class="form-sub">Accede a tu cuenta Forza Gallery</p>
      </div>

      <form class="form" id="login-form">
        <div class="form-group">
          <label for="username">Usuario</label>
          <input type="text" id="username" placeholder="Tu username" required autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="submit-btn" style="width:100%;justify-content:center">
            Entrar
          </button>
        </div>
      </form>

      <div class="auth-switch">
        ¿No tienes cuenta? <a href="/registro.html">Regístrate</a>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/toast.js"></script>
  <script>
    if (isLoggedIn()) window.location.href = "/index.html";
    if (new URLSearchParams(location.search).get("verified") === "1") {
      document.addEventListener("DOMContentLoaded", () =>
        showToast("¡Cuenta verificada! Ya puedes iniciar sesión.", "success")
      );
    }

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("submit-btn");
      btn.disabled = true;
      btn.textContent = "Entrando...";
      try {
        await login(
          document.getElementById("username").value.trim(),
          document.getElementById("password").value
        );
        window.location.href = "/index.html";
      } catch(err) {
        showToast(err.message, "error");
        btn.disabled = false;
        btn.textContent = "Entrar";
      }
    });
  </script>
</body>
</html>
