<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Forza Gallery</title>
  <link rel="stylesheet" href="/css/style.css?v=8" />
</head>
<body>

  <nav class="navbar">
    <a href="/index.html" class="navbar-brand">FORZA<span class="brand-dot"></span>GALLERY</a>
    <ul class="navbar-links">
      <li><a href="/galeria.html">Galería</a></li>
    </ul>
  </nav>

  <div class="teal-divider"></div>

  <div class="auth-container">
    <div class="auth-card">
      <div class="form-header">
        <h1 class="form-title">Login</h1>
        <p class="form-sub">Accede a tu cuenta Forza Gallery</p>
      </div>

      <form class="form" id="login-form">
        <div class="form-group">
          <label for="username">Usuario</label>
          <input type="text" id="username" placeholder="Tu username" required autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="pwd-wrapper">
            <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
            <button type="button" class="pwd-toggle" id="pwd-toggle" aria-label="Mostrar contraseña">
              <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="submit-btn" style="width:100%;justify-content:center">
            Entrar
          </button>
        </div>
      </form>

      <div class="auth-switch">
        ¿No tienes cuenta? <a href="/registro.html">Regístrate</a>
      </div>
    </div>
  </div>

  <script src="/js/api.js?v=4"></script>
  <script src="/js/toast.js"></script>
  <script>
    if (isLoggedIn()) window.location.href = "/index.html";
    if (new URLSearchParams(location.search).get("verified") === "1") {
      document.addEventListener("DOMContentLoaded", () =>
        showToast("¡Cuenta verificada! Ya puedes iniciar sesión.", "success")
      );
    }

    const pwdInput  = document.getElementById("password");
    const pwdToggle = document.getElementById("pwd-toggle");
    const eyeIcon   = document.getElementById("eye-icon");
    const eyeOff = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`;
    const eyeOn  = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
    pwdToggle.addEventListener("click", () => {
      const show = pwdInput.type === "password";
      pwdInput.type = show ? "text" : "password";
      eyeIcon.innerHTML = show ? eyeOff : eyeOn;
      pwdToggle.setAttribute("aria-label", show ? "Ocultar contraseña" : "Mostrar contraseña");
    });

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("submit-btn");
      btn.disabled = true;
      btn.textContent = "Entrando...";
      try {
        await login(
          document.getElementById("username").value.trim(),
          document.getElementById("password").value
        );
        window.location.href = "/index.html";
      } catch(err) {
        showToast(err.message, "error");
        btn.disabled = false;
        btn.textContent = "Entrar";
      }
    });
  </script>
</body>
</html>
