<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subir foto — Forza Gallery</title>
  <link rel="stylesheet" href="/css/style.css?v=13" />
</head>
<body>

  <nav class="navbar">
    <a href="/index.html" class="navbar-brand">FORZA<span class="brand-dot"></span>GALLERY</a>
    <ul class="navbar-links" id="nav-auth"></ul>
  </nav>

  <div class="teal-divider"></div>

  <main>
    <div class="form-container">
      <div class="form-header">
        <h1 class="form-title">Subir foto</h1>
        <p class="form-sub">Comparte tu captura de Forza Horizon</p>
      </div>

      <form class="form" id="upload-form">

        <div class="form-group">
          <label>Imagen</label>
          <div class="upload-zone" id="upload-zone">
            <input type="file" id="file-input" accept="image/*" required />
            <span class="upload-icon">📷</span>
            <p class="upload-text">
              <strong>Haz clic para seleccionar</strong> o arrastra aquí<br>
              <small>JPG, PNG, WEBP — máx 10 MB</small>
            </p>
            <div class="upload-preview" id="preview" style="display:none">
              <img id="preview-img" src="" alt="Preview" />
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="titulo">Título</label>
          <input type="text" id="titulo" placeholder="Ej: Atardecer en México" required maxlength="200" />
        </div>

        <div class="form-group">
          <label for="juego">Juego</label>
          <select id="juego" required>
            <option value="" disabled selected>Selecciona el juego</option>
            <option value="FH1">Forza Horizon 1 (2012)</option>
            <option value="FH2">Forza Horizon 2 (2014)</option>
            <option value="FH3">Forza Horizon 3 (2016)</option>
            <option value="FH4">Forza Horizon 4 (2018)</option>
            <option value="FH5">Forza Horizon 5 (2021)</option>
          </select>
        </div>

        <div class="form-group" id="map-group" style="display:none">
          <label>
            Ubicación en el mapa
            <small style="text-transform:none;font-size:0.8em;letter-spacing:0">(opcional — haz clic en el mapa)</small>
          </label>
          <div class="map-selector-wrap">
            <div class="map-selector-label">
              <span>Haz clic para marcar la ubicación</span>
              <button type="button" class="map-selector-clear" id="map-clear">✕ Quitar</button>
            </div>
            <div class="map-selector" id="map-selector">
              <div class="map-zoom-controls">
                <button type="button" class="map-zoom-btn" id="map-zoom-in">+</button>
                <button type="button" class="map-zoom-btn" id="map-zoom-out">−</button>
                <button type="button" class="map-zoom-btn" id="map-zoom-reset" style="font-size:0.72rem">⊙</button>
              </div>
              <div class="map-zoom-inner" id="map-zoom-inner">
                <img id="map-img" src="" alt="Mapa del juego" draggable="false" />
                <div class="map-pin" id="map-pin"></div>
              </div>
            </div>
          </div>
          <input type="hidden" id="map-x" />
          <input type="hidden" id="map-y" />
        </div>

        <div class="form-group">
          <label>Etiquetas <small style="text-transform:none;font-size:0.8em;letter-spacing:0">(opcional)</small></label>
          <div class="tag-input-wrapper" id="tag-wrapper">
            <input
              type="text"
              class="tag-input-field"
              id="tag-input"
              placeholder="#etiqueta — pulsa Espacio o Enter para añadir"
              autocomplete="off"
            />
          </div>
          <input type="hidden" id="tags-hidden" name="tags" />
        </div>

        <div class="form-group">
          <label for="descripcion">Descripción <small style="text-transform:none;font-size:0.8em;letter-spacing:0">(opcional)</small></label>
          <textarea id="descripcion" rows="3" placeholder="Cuéntanos algo sobre la foto..."></textarea>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="submit-btn">Subir foto</button>
          <a href="/galeria.html" class="btn btn-ghost">Cancelar</a>
        </div>
      </form>
    </div>
  </main>

  <div class="teal-divider"></div>
  <footer class="footer">Forza Gallery &nbsp;·&nbsp; Comunidad Forza Horizon</footer>

  <script src="/js/api.js?v=6"></script>
  <script src="/js/toast.js"></script>
  <script>
    requireAuth("/login.html");
    updateNavAuth();

    const zone      = document.getElementById("upload-zone");
    const fileInput = document.getElementById("file-input");
    const preview   = document.getElementById("preview");
    const previewImg = document.getElementById("preview-img");

    zone.addEventListener("click", (e) => { if (!e.target.closest(".upload-preview")) fileInput.click(); });
    zone.addEventListener("dragover",  (e) => { e.preventDefault(); zone.classList.add("drag-over"); });
    zone.addEventListener("dragleave", () => zone.classList.remove("drag-over"));
    zone.addEventListener("drop", (e) => {
      e.preventDefault();
      zone.classList.remove("drag-over");
      if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener("change", () => { if (fileInput.files[0]) setFile(fileInput.files[0]); });

    function setFile(file) {
      const dt = new DataTransfer();
      dt.items.add(file);
      fileInput.files = dt.files;
      previewImg.src = URL.createObjectURL(file);
      preview.style.display = "block";
    }

    /* ── Tag chips ── */
    const tagWrapper  = document.getElementById("tag-wrapper");
    const tagInput    = document.getElementById("tag-input");
    const tagsHidden  = document.getElementById("tags-hidden");
    const activeTags  = new Set();

    tagWrapper.addEventListener("click", () => tagInput.focus());

    tagInput.addEventListener("keydown", (e) => {
      if (e.key === " " || e.key === "Enter") {
        e.preventDefault();
        addTag(tagInput.value);
      } else if (e.key === "Backspace" && tagInput.value === "") {
        removeLastTag();
      }
    });

    tagInput.addEventListener("blur", () => addTag(tagInput.value));

    function normalizeTag(raw) {
      return raw.replace(/^#+/, "").trim().toLowerCase().replace(/\s+/g, "");
    }

    function addTag(raw) {
      const name = normalizeTag(raw);
      if (!name || activeTags.has(name)) { tagInput.value = ""; return; }
      activeTags.add(name);
      tagInput.value = "";
      renderChips();
      syncHidden();
    }

    function removeTag(name) {
      activeTags.delete(name);
      renderChips();
      syncHidden();
    }

    function removeLastTag() {
      const last = [...activeTags].at(-1);
      if (last) removeTag(last);
    }

    function renderChips() {
      tagWrapper.querySelectorAll(".tag-chip").forEach(c => c.remove());
      [...activeTags].forEach(name => {
        const chip = document.createElement("span");
        chip.className = "tag-chip";
        chip.innerHTML = `#${name} <button type="button" aria-label="Eliminar">&times;</button>`;
        chip.querySelector("button").addEventListener("click", () => removeTag(name));
        tagWrapper.insertBefore(chip, tagInput);
      });
    }

    function syncHidden() {
      tagsHidden.value = [...activeTags].map(t => `#${t}`).join(" ");
    }

    /* ── Map selector con zoom/pan ── */
    const MAP_EXTS = { FH1:"jpg", FH2:"png", FH3:"jpg", FH4:"jpg", FH5:"jpg" };
    const mapContainer = document.getElementById("map-selector");
    const mapInner     = document.getElementById("map-zoom-inner");
    let mScale = 1, mTx = 0, mTy = 0;
    let mDragging = false, mDidDrag = false, mStartX = 0, mStartY = 0, mLastX = 0, mLastY = 0;

    function mApply() {
      mapInner.style.transform = `translate(${mTx}px,${mTy}px) scale(${mScale})`;
    }
    function mClamp() {
      const cw = mapContainer.offsetWidth, ch = mapContainer.offsetHeight;
      const imgEl = document.getElementById("map-img");
      const iw = imgEl.offsetWidth * mScale, ih = imgEl.offsetHeight * mScale;
      const mx = Math.max(0,(iw-cw)/2), my = Math.max(0,(ih-ch)/2);
      mTx = Math.max(-mx, Math.min(mx, mTx));
      mTy = Math.max(-my, Math.min(my, mTy));
      if (iw <= cw) mTx = 0;
      if (ih <= ch) mTy = 0;
    }
    function mZoom(factor, ox, oy) {
      const prev = mScale;
      mScale = Math.max(1, Math.min(8, mScale * factor));
      const r = mScale / prev;
      mTx = ox + (mTx - ox) * r;
      mTy = oy + (mTy - oy) * r;
      mClamp(); mApply();
    }
    function mPlacePin(clientX, clientY) {
      const rect = mapContainer.getBoundingClientRect();
      const cx = clientX - rect.left - mapContainer.offsetWidth / 2;
      const cy = clientY - rect.top  - mapContainer.offsetHeight / 2;
      const imgEl = document.getElementById("map-img");
      const nx = Math.max(0, Math.min(1, (cx - mTx) / (imgEl.offsetWidth  * mScale) + 0.5));
      const ny = Math.max(0, Math.min(1, (cy - mTy) / (imgEl.offsetHeight * mScale) + 0.5));
      const pin = document.getElementById("map-pin");
      pin.style.left = `${nx * 100}%`;
      pin.style.top  = `${ny * 100}%`;
      pin.classList.add("visible");
      document.getElementById("map-x").value = nx.toFixed(4);
      document.getElementById("map-y").value = ny.toFixed(4);
      document.getElementById("map-clear").classList.add("visible");
    }

    mapContainer.addEventListener("wheel", (e) => {
      e.preventDefault();
      const rect = mapContainer.getBoundingClientRect();
      const ox = e.clientX - rect.left - mapContainer.offsetWidth / 2;
      const oy = e.clientY - rect.top  - mapContainer.offsetHeight / 2;
      mZoom(e.deltaY < 0 ? 1.2 : 0.833, ox, oy);
    }, { passive: false });

    mapContainer.addEventListener("mousedown", (e) => {
      mDragging = true; mDidDrag = false;
      mStartX = mLastX = e.clientX; mStartY = mLastY = e.clientY;
      mapContainer.style.cursor = "grabbing";
    });
    document.addEventListener("mousemove", (e) => {
      if (!mDragging) return;
      if (Math.abs(e.clientX-mStartX)>4 || Math.abs(e.clientY-mStartY)>4) mDidDrag = true;
      mTx += e.clientX - mLastX; mTy += e.clientY - mLastY;
      mLastX = e.clientX; mLastY = e.clientY;
      mClamp(); mApply();
    });
    document.addEventListener("mouseup", (e) => {
      if (!mDragging) return;
      mDragging = false;
      mapContainer.style.cursor = "grab";
      if (!mDidDrag) mPlacePin(e.clientX, e.clientY);
    });

    let mTouches = [], mLastPinch = 0;
    mapContainer.addEventListener("touchstart", (e) => {
      mTouches = [...e.touches];
      if (mTouches.length === 1) { mLastX = mTouches[0].clientX; mLastY = mTouches[0].clientY; mStartX = mLastX; mStartY = mLastY; mDidDrag = false; }
      else if (mTouches.length === 2) mLastPinch = Math.hypot(mTouches[1].clientX-mTouches[0].clientX, mTouches[1].clientY-mTouches[0].clientY);
      e.preventDefault();
    }, { passive: false });
    mapContainer.addEventListener("touchmove", (e) => {
      if (e.touches.length === 1) {
        const dx = e.touches[0].clientX-mLastX, dy = e.touches[0].clientY-mLastY;
        if (Math.abs(e.touches[0].clientX-mStartX)>4||Math.abs(e.touches[0].clientY-mStartY)>4) mDidDrag=true;
        mTx+=dx; mTy+=dy; mLastX=e.touches[0].clientX; mLastY=e.touches[0].clientY;
        mClamp(); mApply();
      } else if (e.touches.length === 2) {
        const dist = Math.hypot(e.touches[1].clientX-e.touches[0].clientX, e.touches[1].clientY-e.touches[0].clientY);
        const rect = mapContainer.getBoundingClientRect();
        const ox = (e.touches[0].clientX+e.touches[1].clientX)/2 - rect.left - mapContainer.offsetWidth/2;
        const oy = (e.touches[0].clientY+e.touches[1].clientY)/2 - rect.top  - mapContainer.offsetHeight/2;
        mZoom(dist/mLastPinch, ox, oy); mLastPinch = dist; mDidDrag = true;
      }
      e.preventDefault();
    }, { passive: false });
    mapContainer.addEventListener("touchend", (e) => {
      if (e.changedTouches.length===1 && e.touches.length===0 && !mDidDrag)
        mPlacePin(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
      mTouches = [...e.touches];
    });

    document.getElementById("map-zoom-in").addEventListener("click",    () => mZoom(1.3, 0, 0));
    document.getElementById("map-zoom-out").addEventListener("click",   () => mZoom(0.77, 0, 0));
    document.getElementById("map-zoom-reset").addEventListener("click", () => { mScale=1; mTx=0; mTy=0; mApply(); });

    function clearMapPin() {
      document.getElementById("map-pin").classList.remove("visible");
      document.getElementById("map-x").value = "";
      document.getElementById("map-y").value = "";
      document.getElementById("map-clear").classList.remove("visible");
      mScale=1; mTx=0; mTy=0; mApply();
    }
    document.getElementById("map-clear").addEventListener("click", clearMapPin);

    document.getElementById("juego").addEventListener("change", function() {
      const juego = this.value;
      const mapGroup = document.getElementById("map-group");
      if (juego && MAP_EXTS[juego]) {
        document.getElementById("map-img").src = `/img/maps/${juego.toLowerCase()}.${MAP_EXTS[juego]}`;
        mapGroup.style.display = "";
        clearMapPin();
      } else {
        mapGroup.style.display = "none";
      }
    });

    /* ── Submit ── */
    document.getElementById("upload-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn  = document.getElementById("submit-btn");
      const file = fileInput.files[0];
      if (!file) { showToast("Selecciona una imagen", "warning"); return; }

      const fd = new FormData();
      fd.append("file", file);
      fd.append("titulo", document.getElementById("titulo").value.trim());
      fd.append("juego", document.getElementById("juego").value);
      const desc = document.getElementById("descripcion").value.trim();
      if (desc) fd.append("descripcion", desc);
      if (tagsHidden.value) fd.append("tags", tagsHidden.value);
      const mapX = document.getElementById("map-x").value;
      const mapY = document.getElementById("map-y").value;
      if (mapX && mapY) { fd.append("map_x", mapX); fd.append("map_y", mapY); }

      btn.disabled = true;
      btn.textContent = "Subiendo...";

      try {
        await uploadImagen(fd);
        showToast("¡Foto subida con éxito!", "success");
        setTimeout(() => window.location.href = "/galeria.html", 1200);
      } catch(err) {
        showToast(err.message, "error");
        btn.disabled = false;
        btn.textContent = "Subir foto";
      }
    });
  </script>
</body>
</html>
