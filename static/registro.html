<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro — ForzaGram</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <nav class="navbar">
    <a href="/index.html" class="navbar-brand">FORZA<span class="brand-dot"></span>GRAM</a>
    <ul class="navbar-links">
      <li><a href="/galeria.html">Galería</a></li>
    </ul>
  </nav>

  <div class="teal-divider"></div>

  <div class="auth-container">
    <div class="auth-card">
      <div class="form-header">
        <h1 class="form-title">Registro</h1>
        <p class="form-sub">Únete a la comunidad ForzaGram</p>
      </div>

      <form class="form" id="register-form">
        <div class="form-group">
          <label for="username">Usuario</label>
          <input type="text" id="username" placeholder="Tu username" required autocomplete="username" maxlength="50" />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="tu@email.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="Mínimo 6 caracteres" required autocomplete="new-password" minlength="6" />
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="submit-btn" style="width:100%;justify-content:center">
            Crear cuenta
          </button>
        </div>
      </form>

      <div id="verify-notice" style="display:none;text-align:center;padding:16px 0">
        <p style="font-size:1.4rem">📧</p>
        <p>Hemos enviado un email de verificación a<br><strong id="verify-email-addr"></strong></p>
        <p style="color:#888;font-size:.9em">Revisa tu bandeja de entrada y haz clic en el enlace para activar tu cuenta.</p>
        <a href="/login.html" class="btn btn-primary" style="margin-top:16px;display:inline-block">Ir al login</a>
      </div>

      <div class="auth-switch">
        ¿Ya tienes cuenta? <a href="/login.html">Inicia sesión</a>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/toast.js"></script>
  <script>
    if (isLoggedIn()) window.location.href = "/index.html";

    document.getElementById("register-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("submit-btn");
      btn.disabled = true;
      btn.textContent = "Creando cuenta...";
      try {
        const data = await register(
          document.getElementById("username").value.trim(),
          document.getElementById("email").value.trim(),
          document.getElementById("password").value
        );
        document.getElementById("register-form").style.display = "none";
        document.getElementById("verify-notice").style.display = "block";
        document.getElementById("verify-email-addr").textContent = data.email;
      } catch(err) {
        showToast(err.message, "error");
        btn.disabled = false;
        btn.textContent = "Crear cuenta";
      }
    });
  </script>
</body>
</html>
