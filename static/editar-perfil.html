<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editar perfil — Forza Gallery</title>
  <link rel="stylesheet" href="/css/style.css?v=6" />
  <style>
    .crop-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 600;
      background: rgba(0,0,0,0.88);
      align-items: center;
      justify-content: center;
    }
    .crop-overlay.open { display: flex; }
    .crop-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      width: min(340px, 94vw);
    }
    .crop-hint {
      font-size: 0.78rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
    }
    #crop-canvas {
      display: block;
      width: 270px;
      height: 270px;
      cursor: grab;
      touch-action: none;
      border-radius: 4px;
    }
    #crop-canvas:active { cursor: grabbing; }
    .crop-zoom-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .crop-zoom-btn {
      background: var(--surface2);
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--white);
      border-radius: var(--radius);
      width: 36px; height: 36px;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .crop-zoom-btn:hover { background: rgba(255,255,255,0.1); }
    #crop-zoom-range {
      -webkit-appearance: none;
      appearance: none;
      width: 140px;
      height: 4px;
      background: var(--surface2);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    #crop-zoom-range::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--teal);
      cursor: pointer;
    }
    .crop-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
      width: 100%;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="/index.html" class="navbar-brand">FORZA<span class="brand-dot"></span>GALLERY</a>
    <ul class="navbar-links" id="nav-auth"></ul>
  </nav>

  <div class="teal-divider"></div>

  <main>
    <div class="form-container">
      <div class="form-header">
        <h1 class="form-title">Editar perfil</h1>
        <p class="form-sub">Personaliza tu perfil público</p>
      </div>

      <form class="form" id="perfil-form">

        <div class="form-group" style="align-items:center">
          <label>Avatar</label>
          <div class="avatar-edit-wrap">
            <img id="avatar-preview" src="/img/default-avatar.svg" alt="Avatar" class="perfil-avatar" style="width:90px;height:90px" />
            <label for="avatar-input" class="btn btn-ghost" style="margin-top:0.5rem;cursor:pointer">Cambiar foto</label>
            <input type="file" id="avatar-input" accept="image/jpeg,image/png,image/webp" style="display:none" />
          </div>
        </div>

        <div class="form-group">
          <label for="bio">Biografía <small style="text-transform:none;font-size:0.8em;letter-spacing:0">(opcional)</small></label>
          <textarea id="bio" rows="3" placeholder="Cuéntanos algo sobre ti..." maxlength="300"></textarea>
        </div>

        <div class="form-group">
          <label>Visibilidad del perfil</label>
          <div style="display:flex;gap:1rem;margin-top:0.25rem">
            <label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer;text-transform:none;letter-spacing:0;font-size:1rem;color:#e0e0e0">
              <input type="radio" name="visibilidad" value="public" checked /> Público
            </label>
            <label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer;text-transform:none;letter-spacing:0;font-size:1rem;color:#e0e0e0">
              <input type="radio" name="visibilidad" value="private" /> Privado
            </label>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="submit-btn">Guardar cambios</button>
          <a id="back-link" href="#" class="btn btn-ghost">Cancelar</a>
        </div>
      </form>
    </div>
  </main>

  <!-- Crop modal -->
  <div class="crop-overlay" id="crop-overlay">
    <div class="crop-box">
      <p class="crop-hint">Arrastra para encuadrar &nbsp;·&nbsp; Scroll o desliza para zoom</p>
      <canvas id="crop-canvas" width="270" height="270"></canvas>
      <div class="crop-zoom-row">
        <button type="button" class="crop-zoom-btn" id="crop-zoom-out">−</button>
        <input type="range" id="crop-zoom-range" min="0" max="100" value="0" />
        <button type="button" class="crop-zoom-btn" id="crop-zoom-in">+</button>
      </div>
      <div class="crop-actions">
        <button type="button" class="btn btn-ghost" id="crop-cancel">Cancelar</button>
        <button type="button" class="btn btn-primary" id="crop-apply">Aplicar</button>
      </div>
    </div>
  </div>

  <div class="teal-divider"></div>
  <footer class="footer">Forza Gallery &nbsp;·&nbsp; Comunidad Forza Horizon</footer>

  <script src="/js/api.js?v=2"></script>
  <script src="/js/toast.js"></script>
  <script>
    requireAuth("/login.html");
    updateNavAuth();

    let currentUsername = "";

    async function loadCurrentPerfil() {
      const me = await fetchMe();
      currentUsername = me.username;
      document.getElementById("back-link").href = `/perfil.html?u=${me.username}`;
      try {
        const perfil = await apiFetch(`/usuarios/${me.username}`);
        document.getElementById("bio").value = perfil.bio || "";
        const radio = perfil.is_public ? "public" : "private";
        document.querySelector(`input[name="visibilidad"][value="${radio}"]`).checked = true;
        if (perfil.avatar_url) document.getElementById("avatar-preview").src = perfil.avatar_url;
      } catch {}
    }

    /* ── CROPPER ── */
    const DISPLAY = 270;
    const OUTPUT  = 400;
    const RADIUS  = DISPLAY / 2 - 6;

    let cropImg = null, cropZoom = 1, cropMinZoom = 1, cropOx = 0, cropOy = 0;
    let dragState = null, touchState = null;

    function clampOffset() {
      const hw = cropImg.width  * cropZoom / 2;
      const hh = cropImg.height * cropZoom / 2;
      const mx = Math.max(0, hw - RADIUS);
      const my = Math.max(0, hh - RADIUS);
      cropOx = Math.max(-mx, Math.min(mx, cropOx));
      cropOy = Math.max(-my, Math.min(my, cropOy));
    }

    function draw() {
      const canvas = document.getElementById("crop-canvas");
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, DISPLAY, DISPLAY);

      const sw = cropImg.width  * cropZoom;
      const sh = cropImg.height * cropZoom;
      const sx = DISPLAY / 2 - sw / 2 + cropOx;
      const sy = DISPLAY / 2 - sh / 2 + cropOy;
      ctx.drawImage(cropImg, sx, sy, sw, sh);

      ctx.save();
      ctx.fillStyle = "rgba(0,0,0,0.6)";
      ctx.beginPath();
      ctx.rect(0, 0, DISPLAY, DISPLAY);
      ctx.arc(DISPLAY / 2, DISPLAY / 2, RADIUS, 0, Math.PI * 2, true);
      ctx.fill("evenodd");

      ctx.beginPath();
      ctx.arc(DISPLAY / 2, DISPLAY / 2, RADIUS, 0, Math.PI * 2);
      ctx.strokeStyle = "rgba(255,255,255,0.55)";
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.restore();
    }

    function setZoomFromRange(val) {
      const t = val / 100;
      cropZoom = cropMinZoom * Math.pow(4, t);
      clampOffset();
      draw();
    }

    function syncRange() {
      const t = Math.log(cropZoom / cropMinZoom) / Math.log(4);
      document.getElementById("crop-zoom-range").value = Math.round(t * 100);
    }

    function openCropper(file) {
      const url = URL.createObjectURL(file);
      const img = new Image();
      img.onload = () => {
        cropImg = img;
        const minDim = Math.min(img.width, img.height);
        cropMinZoom = (RADIUS * 2) / minDim;
        cropZoom = cropMinZoom;
        cropOx = 0; cropOy = 0;
        document.getElementById("crop-zoom-range").value = 0;
        draw();
        document.getElementById("crop-overlay").classList.add("open");
      };
      img.src = url;
    }

    function getCroppedBlob() {
      return new Promise(resolve => {
        const out = document.createElement("canvas");
        out.width = OUTPUT; out.height = OUTPUT;
        const ctx = out.getContext("2d");
        const scale = OUTPUT / DISPLAY;
        const sw = cropImg.width  * cropZoom * scale;
        const sh = cropImg.height * cropZoom * scale;
        const sx = OUTPUT / 2 - sw / 2 + cropOx * scale;
        const sy = OUTPUT / 2 - sh / 2 + cropOy * scale;
        ctx.beginPath();
        ctx.arc(OUTPUT / 2, OUTPUT / 2, OUTPUT / 2, 0, Math.PI * 2);
        ctx.clip();
        ctx.drawImage(cropImg, sx, sy, sw, sh);
        out.toBlob(resolve, "image/jpeg", 0.92);
      });
    }

    const canvas = document.getElementById("crop-canvas");

    canvas.addEventListener("mousedown", e => {
      dragState = { x: e.clientX, y: e.clientY, ox: cropOx, oy: cropOy };
    });
    window.addEventListener("mousemove", e => {
      if (!dragState) return;
      cropOx = dragState.ox + (e.clientX - dragState.x);
      cropOy = dragState.oy + (e.clientY - dragState.y);
      clampOffset(); draw();
    });
    window.addEventListener("mouseup", () => { dragState = null; });

    canvas.addEventListener("wheel", e => {
      e.preventDefault();
      cropZoom = Math.max(cropMinZoom, cropZoom * (e.deltaY < 0 ? 1.1 : 0.91));
      clampOffset(); syncRange(); draw();
    }, { passive: false });

    canvas.addEventListener("touchstart", e => {
      if (e.touches.length === 1) {
        touchState = { type: "drag", x: e.touches[0].clientX, y: e.touches[0].clientY, ox: cropOx, oy: cropOy };
      } else if (e.touches.length === 2) {
        const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        touchState = { type: "pinch", dist: d, zoom: cropZoom };
      }
    }, { passive: true });

    canvas.addEventListener("touchmove", e => {
      e.preventDefault();
      if (!touchState) return;
      if (touchState.type === "drag" && e.touches.length === 1) {
        cropOx = touchState.ox + (e.touches[0].clientX - touchState.x);
        cropOy = touchState.oy + (e.touches[0].clientY - touchState.y);
        clampOffset(); draw();
      } else if (touchState.type === "pinch" && e.touches.length === 2) {
        const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        cropZoom = Math.max(cropMinZoom, touchState.zoom * d / touchState.dist);
        clampOffset(); syncRange(); draw();
      }
    }, { passive: false });

    canvas.addEventListener("touchend", () => { touchState = null; });

    document.getElementById("crop-zoom-range").addEventListener("input", e => {
      setZoomFromRange(+e.target.value);
    });
    document.getElementById("crop-zoom-in").addEventListener("click", () => {
      cropZoom = Math.min(cropMinZoom * 4, cropZoom * 1.15);
      clampOffset(); syncRange(); draw();
    });
    document.getElementById("crop-zoom-out").addEventListener("click", () => {
      cropZoom = Math.max(cropMinZoom, cropZoom / 1.15);
      clampOffset(); syncRange(); draw();
    });

    document.getElementById("crop-cancel").addEventListener("click", () => {
      document.getElementById("crop-overlay").classList.remove("open");
      document.getElementById("avatar-input").value = "";
    });

    document.getElementById("crop-apply").addEventListener("click", async () => {
      const btn = document.getElementById("crop-apply");
      btn.disabled = true;
      btn.textContent = "Subiendo...";
      try {
        const blob = await getCroppedBlob();
        const fd = new FormData();
        fd.append("file", blob, "avatar.jpg");
        const token = localStorage.getItem("forzaToken");
        const res = await fetch("/api/v1/usuarios/me/avatar", {
          method: "PUT",
          headers: token ? { Authorization: `Bearer ${token}` } : {},
          body: fd,
        });
        if (!res.ok) throw new Error();
        const perfil = await res.json();
        document.getElementById("avatar-preview").src = perfil.avatar_url + "?t=" + Date.now();
        document.getElementById("crop-overlay").classList.remove("open");
        showToast("Avatar actualizado", "success");
      } catch {
        showToast("Error al subir el avatar", "error");
      } finally {
        btn.disabled = false;
        btn.textContent = "Aplicar";
      }
    });

    document.getElementById("avatar-input").addEventListener("change", e => {
      const file = e.target.files[0];
      if (file) openCropper(file);
    });

    /* ── PERFIL FORM ── */
    document.getElementById("perfil-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("submit-btn");
      btn.disabled = true;
      btn.textContent = "Guardando...";
      try {
        const is_public = document.querySelector('input[name="visibilidad"]:checked').value === "public";
        await apiFetch("/usuarios/me", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ bio: document.getElementById("bio").value.trim() || null, is_public }),
        });
        showToast("Perfil actualizado", "success");
        setTimeout(() => window.location.href = `/perfil.html?u=${currentUsername}`, 1000);
      } catch(err) {
        showToast(err.message, "error");
        btn.disabled = false;
        btn.textContent = "Guardar cambios";
      }
    });

    loadCurrentPerfil();
  </script>
</body>
</html>
