<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galería — Forza Gallery</title>
  <link rel="stylesheet" href="/css/style.css?v=14" />
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
</head>
<body>

  <nav class="navbar">
    <a href="/index.html" class="navbar-brand">FORZA<span class="brand-dot"></span>GALLERY</a>
    <ul class="navbar-links" id="nav-auth"></ul>
  </nav>

  <div class="teal-divider"></div>

  <main>
    <div class="page-header">
      <div class="page-header-top">
        <h1 class="page-title">Galería</h1>
        <div style="display:flex;align-items:center;gap:0.75rem;">
          <span class="page-count" id="count-label"></span>
          <button class="filter-btn" id="trending-toggle-btn" title="Ver trending">🔥 Trending</button>
        </div>
      </div>
    </div>

    <div class="search-bar">
      <input type="search" class="search-input" id="gallery-search" placeholder="🔍  Buscar por título o descripción..." autocomplete="off" />
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" data-juego="">Todos</button>
      <button class="filter-btn" data-juego="FH1">FH1</button>
      <button class="filter-btn" data-juego="FH2">FH2</button>
      <button class="filter-btn" data-juego="FH3">FH3</button>
      <button class="filter-btn" data-juego="FH4">FH4</button>
      <button class="filter-btn" data-juego="FH5">FH5</button>
      <div class="filter-divider"></div>
      <div class="filter-dropdown-wrap">
        <button class="filter-btn filter-dropdown-btn" id="period-btn">📅 Período ▾</button>
        <div class="filter-dropdown-menu" id="period-menu">
          <button class="filter-drop-item active" data-period="">Todos</button>
          <button class="filter-drop-item" data-period="week">Esta semana</button>
          <button class="filter-drop-item" data-period="month">Este mes</button>
          <button class="filter-drop-item" data-period="year">Este año</button>
        </div>
      </div>
      <div class="filter-dropdown-wrap">
        <button class="filter-btn filter-dropdown-btn" id="orden-btn">↕ Recientes ▾</button>
        <div class="filter-dropdown-menu" id="orden-menu">
          <button class="filter-drop-item active" data-orden="recientes">Más recientes</button>
          <button class="filter-drop-item" data-orden="antiguos">Más antiguos</button>
          <button class="filter-drop-item" data-orden="visitados">Más visitados</button>
        </div>
      </div>
      <div class="filter-divider" id="mis-fotos-divider" style="display:none"></div>
      <button class="filter-btn" id="mis-fotos-btn" style="display:none">👤 Mis fotos</button>
    </div>

    <div class="tag-filter-bar" id="tag-filter-bar" style="display:none">
      <span class="tag-filter-active">
        <span id="tag-filter-text"></span>
        <button id="tag-filter-clear" title="Quitar filtro">✕</button>
      </span>
    </div>

    <div class="gallery-grid" id="gallery"></div>
    <div class="gallery-sentinel" id="gallery-sentinel"></div>

    <div id="trending-panel" style="display:none">
      <div class="coverflow-section">
        <div class="coverflow-container">
          <button class="coverflow-arrow" id="cf-prev">&#8249;</button>
          <div class="coverflow-stage" id="cf-stage"></div>
          <button class="coverflow-arrow" id="cf-next">&#8250;</button>
        </div>
        <div class="coverflow-dots" id="cf-dots"></div>
        <div class="coverflow-info">
          <div class="coverflow-info-title" id="cf-title"></div>
          <div class="coverflow-info-sub" id="cf-sub"></div>
        </div>
      </div>
    </div>
  </main>

  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lb-close">✕</button>
    <div class="lb-panel">
      <div class="lb-header">
        <div class="lb-title-bar" id="lb-title"></div>
        <div style="display:flex;align-items:center;gap:0.5rem;flex-shrink:0">
          <button class="lb-date" id="lb-date"></button>
          <div class="lb-map-wrap" id="lb-map-wrap">
            <button class="lb-action-btn" id="lb-map-btn" title="Ver ubicación en mapa" style="display:none;padding:0.2rem 0.5rem;font-size:0.85rem">📍</button>
            <div class="lb-map-widget" id="lb-map-widget">
              <div class="lb-map-widget-inner" id="lb-map-widget-inner">
                <div class="map-zoom-controls">
                  <button type="button" class="map-zoom-btn" id="lb-map-zoom-in">+</button>
                  <button type="button" class="map-zoom-btn" id="lb-map-zoom-out">−</button>
                  <button type="button" class="map-zoom-btn" id="lb-map-zoom-reset" style="font-size:0.72rem">⊙</button>
                </div>
                <div class="map-zoom-inner" id="lb-map-zoom-inner">
                  <img id="lb-map-img" src="" alt="Mapa" />
                  <div class="lb-map-dot" id="lb-map-dot"></div>
                </div>
              </div>
              <div class="lb-map-footer" id="lb-map-footer"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="lb-img-wrap">
        <img id="lb-img" src="" alt="" />
      </div>
      <div class="lb-info-bar">
        <div class="lb-info-left">
          <span class="juego-badge" id="lb-juego"></span>
          <div class="tags-row" id="lb-tags"></div>
          <a class="lb-username" id="lb-username" href="#">@—</a>
          <p class="lb-desc" id="lb-desc"></p>
        </div>
        <div class="lb-info-right">
          <div class="lb-actions">
            <button class="lb-action-btn" id="lb-like-btn" title="Like">
              <span class="lb-action-icon">♡</span><span id="lb-like-count">0</span>
            </button>
            <button class="lb-action-btn" id="lb-save-btn" title="Guardar">
              <span class="lb-action-icon">🔖</span>
            </button>
            <button class="lb-action-btn" id="lb-comment-btn" title="Comentarios">
              <span class="lb-action-icon">💬</span><span id="lb-comment-count">0</span>
            </button>
            <button class="lb-action-btn" id="lb-edit-toggle" style="display:none" title="Editar">✏️</button>
            <span class="lb-action-stat" title="Visitas">
              <span class="lb-action-icon">👁</span><span id="lb-views-count">0</span>
            </span>
            <div class="lb-share-wrap" id="lb-share-wrap">
              <button class="lb-action-btn" id="lb-share-btn" title="Compartir">
                <span class="lb-action-icon">↗</span>
              </button>
              <div class="lb-share-menu" id="lb-share-menu" style="display:none">
                <a class="lb-share-item" id="lb-share-wa" href="#" target="_blank" rel="noopener noreferrer">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413z"/><path d="M12 2C6.477 2 2 6.477 2 12c0 1.89.525 3.66 1.438 5.168L2 22l4.988-1.31A9.945 9.945 0 0012 22c5.523 0 10-4.477 10-10S17.523 2 12 2z"/></svg>
                  <span>WhatsApp</span>
                </a>
                <a class="lb-share-item" id="lb-share-tw" href="#" target="_blank" rel="noopener noreferrer">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.259 5.629L18.244 2.25zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77z"/></svg>
                  <span>Twitter / X</span>
                </a>
                <button class="lb-share-item" id="lb-share-copy">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                  <span>Copiar enlace</span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="lb-edit-form" id="lb-edit-form" style="display:none">
        <input class="lb-edit-input" id="lb-edit-titulo" placeholder="Título" maxlength="200" />
        <div class="lb-edit-row">
          <select class="lb-edit-select" id="lb-edit-juego">
            <option value="FH1">FH1</option>
            <option value="FH2">FH2</option>
            <option value="FH3">FH3</option>
            <option value="FH4">FH4</option>
            <option value="FH5">FH5</option>
          </select>
          <input class="lb-edit-input" id="lb-edit-tags" placeholder="Tags (separados por espacio)" />
        </div>
        <textarea class="lb-edit-textarea" id="lb-edit-desc" placeholder="Descripción (opcional)" maxlength="500"></textarea>
        <div class="lb-edit-actions">
          <button class="lb-edit-btn lb-edit-btn-cancel" id="lb-edit-cancel">Cancelar</button>
          <button class="lb-edit-btn lb-edit-btn-save" id="lb-edit-save">Guardar</button>
        </div>
      </div>

      <div class="lb-comments" id="lb-comments">
        <div class="lb-comments-list" id="lb-comments-list"></div>
        <div class="lb-comment-form" id="lb-comment-form" style="display:none">
          <input class="lb-comment-input" id="lb-comment-input" placeholder="Añadir comentario..." maxlength="500" />
          <button class="lb-comment-submit" id="lb-comment-submit">Enviar</button>
        </div>
        <p class="lb-login-hint" id="lb-login-hint" style="display:none">
          <a href="/login.html">Inicia sesión</a> para comentar, dar like o guardar
        </p>
      </div>
    </div>
  </div>

  <div class="teal-divider" style="margin-top:auto"></div>
  <footer class="footer">Forza Gallery &nbsp;·&nbsp; Comunidad Forza Horizon</footer>

  <script src="/js/api.js?v=6"></script>
  <script src="/js/toast.js"></script>
  <script>
    updateNavAuth();

    const _params    = new URLSearchParams(location.search);
    let currentJuego  = _params.get("juego") || "";
    let currentTag    = _params.get("tag") || "";
    let currentFecha  = _params.get("fecha") || "";
    let currentPeriodo  = "";
    let currentOrden    = "recientes";
    let currentMisFotos = false;
    let currentUser     = null;
    let currentSearch   = "";
    let _allImages      = [];
    let _renderedCount  = 0;
    const PAGE_SIZE     = 20;

    // Add year buttons dynamically
    (function() {
      const menu = document.getElementById("period-menu");
      const year = new Date().getFullYear();
      for (let y = year; y >= 2024; y--) {
        const btn = document.createElement("button");
        btn.className = "filter-drop-item";
        btn.dataset.period = String(y);
        btn.textContent = String(y);
        menu.appendChild(btn);
      }
    })();

    async function loadUser() {
      if (isLoggedIn()) {
        try { currentUser = await fetchMe(); } catch { currentUser = null; }
      }
    }

    function formatDate(iso) {
      return new Date(iso).toLocaleDateString("es-ES", { day:"2-digit", month:"short", year:"numeric" });
    }

    function updateFilterBar() {
      const bar   = document.getElementById("tag-filter-bar");
      const label = document.getElementById("tag-filter-text");
      if (currentTag) {
        bar.style.display = "flex";
        label.textContent = `#${currentTag}`;
      } else if (currentFecha) {
        bar.style.display = "flex";
        label.textContent = `📅 ${currentFecha}`;
      } else {
        bar.style.display = "none";
      }
    }

    function updatePeriodBtn() {
      const labels = { "": "Período", week: "Esta semana", month: "Este mes", year: "Este año" };
      const label = labels[currentPeriodo] ?? currentPeriodo;
      const btn = document.getElementById("period-btn");
      btn.textContent = `📅 ${label} ▾`;
      btn.classList.toggle("active", !!(currentPeriodo || currentFecha));
      document.querySelectorAll("#period-menu .filter-drop-item").forEach(item =>
        item.classList.toggle("active", item.dataset.period === currentPeriodo)
      );
    }

    function updateOrdenBtn() {
      const labels = { recientes: "Recientes", antiguos: "Más antiguos", visitados: "Más visitados" };
      document.getElementById("orden-btn").textContent = `↕ ${labels[currentOrden] || "Recientes"} ▾`;
      document.getElementById("orden-btn").classList.toggle("active", currentOrden !== "recientes");
      document.querySelectorAll("#orden-menu .filter-drop-item").forEach(item =>
        item.classList.toggle("active", item.dataset.orden === currentOrden)
      );
    }

    function setTagFilter(tag) {
      currentTag = tag;
      updateFilterBar();
      loadGallery();
    }

    function setDateFilter(fecha) {
      currentFecha = fecha;
      currentPeriodo = "";
      updateFilterBar();
      updatePeriodBtn();
      loadGallery();
    }

    function setPeriodo(periodo) {
      currentPeriodo = periodo;
      currentFecha = "";
      updateFilterBar();
      updatePeriodBtn();
      loadGallery();
    }

    function setOrden(orden) {
      currentOrden = orden;
      updateOrdenBtn();
      loadGallery();
    }

    function applyPeriodoFilter(imagenes) {
      if (!currentPeriodo) return imagenes;
      const now = new Date();
      return imagenes.filter(img => {
        const d = new Date(img.created_at);
        if (currentPeriodo === "week") {
          const ago = new Date(now); ago.setDate(now.getDate() - 7);
          return d >= ago;
        }
        if (currentPeriodo === "month")
          return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
        if (currentPeriodo === "year")
          return d.getFullYear() === now.getFullYear();
        return d.getFullYear() === parseInt(currentPeriodo);
      });
    }

    function applyMisFotos(imagenes) {
      if (!currentMisFotos || !currentUser) return imagenes;
      return imagenes.filter(img => img.usuario_id === currentUser.id);
    }

    function applyOrden(imagenes) {
      const s = [...imagenes];
      if (currentOrden === "antiguos")  s.sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
      else if (currentOrden === "visitados") s.sort((a,b) => (b.visitas||0) - (a.visitas||0));
      else s.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
      return s;
    }

    document.getElementById("tag-filter-clear").addEventListener("click", () => {
      history.replaceState(null, "", location.pathname);
      currentTag = "";
      currentFecha = "";
      currentPeriodo = "";
      updateFilterBar();
      updatePeriodBtn();
      loadGallery();
    });

    if (currentTag) { updateFilterBar(); }
    if (currentFecha) { updateFilterBar(); updatePeriodBtn(); }

    function renderSkeletons() {
      const grid = document.getElementById("gallery");
      grid.innerHTML = Array(8).fill(`
        <div class="img-card skeleton-card">
          <div class="skeleton" style="width:100%;height:100%;position:absolute;inset:0"></div>
        </div>
      `).join("");
    }

    function tagsHtml(tags) {
      if (!tags || !tags.length) return "";
      return tags.map(t => `<span class="hashtag" data-tag="${t}">#${t}</span>`).join("");
    }

    let currentLbId   = null;
    let currentLbData = null;

    function openLightbox(img) {
      currentLbId   = img.id;
      currentLbData = img;

      document.getElementById("lb-img").src = img.filename;
      document.getElementById("lb-img").alt = img.titulo;
      document.getElementById("lb-title").textContent = img.titulo;
      document.getElementById("lb-desc").textContent  = img.descripcion || "";

      const badge = document.getElementById("lb-juego");
      badge.textContent = img.juego;
      badge.className = `juego-badge ${img.juego}`;

      const lbTags = document.getElementById("lb-tags");
      lbTags.innerHTML = (img.tags || []).map(t =>
        `<span class="hashtag" data-tag="${t}">#${t}</span>`
      ).join("");
      lbTags.querySelectorAll(".hashtag").forEach(el =>
        el.addEventListener("click", () => {
          closeLightbox();
          history.replaceState(null, "", `?tag=${el.dataset.tag}`);
          setTagFilter(el.dataset.tag);
        })
      );

      const userEl = document.getElementById("lb-username");
      userEl.textContent = `@${img.username || "—"}`;
      userEl.href = `/perfil.html?u=${img.username}`;

      const d = new Date(img.created_at);
      const dateStr = d.toLocaleDateString("es-ES", { day: "2-digit", month: "short", year: "numeric" });
      const timeStr = d.toLocaleTimeString("es-ES", { hour: "2-digit", minute: "2-digit" });
      const dateOnly = d.toISOString().split("T")[0];
      const dateEl = document.getElementById("lb-date");
      dateEl.textContent = `${dateStr} · ${timeStr}`;
      dateEl.onclick = () => {
        closeLightbox();
        history.replaceState(null, "", `?fecha=${dateOnly}`);
        setDateFilter(dateOnly);
      };

      document.getElementById("lb-views-count").textContent = img.visitas ?? 0;
      document.getElementById("lb-share-menu").style.display = "none";
      document.getElementById("lb-like-count").textContent = "0";
      document.getElementById("lb-like-btn").className = "lb-action-btn";
      document.getElementById("lb-save-btn").className = "lb-action-btn";
      document.getElementById("lb-comments-list").innerHTML = "";
      document.getElementById("lb-comment-input") && (document.getElementById("lb-comment-input").value = "");
      document.getElementById("lb-edit-form").style.display = "none";
      document.getElementById("lb-edit-toggle").className = "lb-edit-toggle";

      const MAP_EXTS = { FH1:"jpg", FH2:"png", FH3:"jpg", FH4:"jpg", FH5:"jpg" };
      const MAP_NAMES = { FH1:"Colorado", FH2:"Europa del Sur", FH3:"Australia", FH4:"Gran Bretaña", FH5:"México" };
      const mapBtn = document.getElementById("lb-map-btn");
      const mapWidget = document.getElementById("lb-map-widget");
      mapWidget.classList.remove("open");
      if (img.map_x != null && img.map_y != null) {
        mapBtn.style.display = "inline-flex";
        const ext = MAP_EXTS[img.juego] || "jpg";
        document.getElementById("lb-map-img").src = `/img/maps/${img.juego.toLowerCase()}.${ext}`;
        document.getElementById("lb-map-dot").style.left = `${img.map_x * 100}%`;
        document.getElementById("lb-map-dot").style.top  = `${img.map_y * 100}%`;
        document.getElementById("lb-map-footer").textContent = `${img.juego} · ${MAP_NAMES[img.juego] || ""}`;
      } else {
        mapBtn.style.display = "none";
      }

      const editBtn = document.getElementById("lb-edit-toggle");
      editBtn.style.display = (currentUser && currentUser.id === img.usuario_id) ? "inline-flex" : "none";

      document.getElementById("lightbox").classList.add("open");
      loadLbSocial(img.id);
    }

    function closeLightbox() {
      document.getElementById("lightbox").classList.remove("open");
      document.getElementById("lb-edit-form").style.display = "none";
      document.getElementById("lb-edit-toggle").className = "lb-edit-toggle";
      document.getElementById("lb-share-menu").style.display = "none";
      document.getElementById("lb-map-widget").classList.remove("open");
      currentLbId   = null;
      currentLbData = null;
    }

    function updateLikeBtn(liked, count) {
      const btn = document.getElementById("lb-like-btn");
      btn.className = "lb-action-btn" + (liked ? " liked" : "");
      btn.querySelector(".lb-action-icon").textContent = liked ? "♥" : "♡";
      document.getElementById("lb-like-count").textContent = count;
    }

    const EMOJIS = ["❤️","😂","😮","👍","🔥"];

    function renderComentarios(comentarios, imagenId) {
      const list = document.getElementById("lb-comments-list");
      document.getElementById("lb-comment-count").textContent = comentarios.length;
      if (!comentarios.length) { list.innerHTML = ""; return; }

      list.innerHTML = comentarios.map(c => {
        const reacciones = EMOJIS.map(e => {
          const count = (c.reacciones && c.reacciones[e]) || 0;
          const active = c.mi_reaccion === e ? " active" : "";
          return `<button class="lb-reaction-btn${active}" data-cid="${c.id}" data-emoji="${e}">
            ${e}<span class="lb-reaction-count">${count || ""}</span>
          </button>`;
        }).join("");

        return `
          <div class="lb-comment-item" data-id="${c.id}">
            <div class="lb-comment-body">
              <div class="lb-comment-header">
                <a class="lb-comment-author" href="/perfil.html?u=${c.username}">${c.username}</a>
                <span class="lb-comment-time">${timeAgo(c.created_at)}</span>
              </div>
              <span class="lb-comment-text">${c.contenido.replace(/</g,"&lt;")}</span>
              <div class="lb-reactions">${reacciones}</div>
            </div>
            <div class="lb-comment-actions">
              ${currentUser && currentUser.id === c.usuario_id
                ? `<button class="lb-comment-action delete" data-id="${c.id}" title="Eliminar">🗑</button>`
                : (currentUser
                    ? `<button class="lb-comment-action report" data-id="${c.id}" title="Reportar">⚑</button>`
                    : "")}
            </div>
          </div>`;
      }).join("");

      list.querySelectorAll(".lb-reaction-btn").forEach(btn =>
        btn.addEventListener("click", async () => {
          if (!isLoggedIn()) { showToast("Inicia sesión para reaccionar", "info"); return; }
          try {
            const res = await reaccionar(btn.dataset.cid, btn.dataset.emoji);
            const cs = await getComentarios(imagenId);
            renderComentarios(cs, imagenId);
          } catch(e) { showToast(e.message, "error"); }
        })
      );
      list.querySelectorAll(".delete").forEach(btn =>
        btn.addEventListener("click", async () => {
          try {
            await deleteComentario(btn.dataset.id);
            const cs = await getComentarios(imagenId);
            renderComentarios(cs, imagenId);
          } catch(e) { showToast(e.message, "error"); }
        })
      );
      list.querySelectorAll(".report").forEach(btn =>
        btn.addEventListener("click", async () => {
          try {
            await reportarComentario(btn.dataset.id);
            showToast("Comentario reportado", "info");
            btn.disabled = true;
          } catch(e) { showToast(e.message, "error"); }
        })
      );
    }

    async function loadLbSocial(imagenId) {
      try {
        const likes = await getLikes(imagenId);
        updateLikeBtn(likes.liked, likes.count);
      } catch {}

      if (_renderedCount === 0) {

      _observer.observe(sentinel);

    /* ── Map widget zoom/pan ── */
    const lbMapContainer = document.getElementById("lb-map-widget-inner");
    const lbMapInner     = document.getElementById("lb-map-zoom-inner");
    let lmScale = 1, lmTx = 0, lmTy = 0;
    let lmDrag = false, lmDidDrag = false, lmLX = 0, lmLY = 0;

    function lmApply() {
      lbMapInner.style.transform = `translate(${lmTx}px,${lmTy}px) scale(${lmScale})`;
    }
    function lmClamp() {
      const cw = lbMapContainer.offsetWidth, ch = lbMapContainer.offsetHeight;
      const img = document.getElementById("lb-map-img");
      const iw = img.offsetWidth * lmScale, ih = img.offsetHeight * lmScale;
      const mx = Math.max(0,(iw-cw)/2), my = Math.max(0,(ih-ch)/2);
      lmTx = Math.max(-mx, Math.min(mx, lmTx));
      lmTy = Math.max(-my, Math.min(my, lmTy));
      if (iw<=cw) lmTx=0; if (ih<=ch) lmTy=0;
    }
    function lmZoom(factor, ox, oy) {
      const prev = lmScale;
      lmScale = Math.max(1, Math.min(8, lmScale * factor));
      const r = lmScale / prev;
      lmTx = ox+(lmTx-ox)*r; lmTy = oy+(lmTy-oy)*r;
      lmClamp(); lmApply();
    }
    function lmReset() { lmScale=1; lmTx=0; lmTy=0; lmApply(); }
    function lmCenterOnPin() {
      const img = document.getElementById("lb-map-img");
      const dot = document.getElementById("lb-map-dot");
      if (!img.offsetWidth || !dot.style.left) return;
      lmScale = 3;
      const nx = parseFloat(dot.style.left) / 100;
      const ny = parseFloat(dot.style.top)  / 100;
      lmTx = -(nx - 0.5) * img.offsetWidth  * lmScale;
      lmTy = -(ny - 0.5) * img.offsetHeight * lmScale;
      lmClamp(); lmApply();
    }

    lbMapContainer.addEventListener("wheel", (e) => {
      e.preventDefault();
      const rect = lbMapContainer.getBoundingClientRect();
      const ox = e.clientX - rect.left - lbMapContainer.offsetWidth / 2;
      const oy = e.clientY - rect.top  - lbMapContainer.offsetHeight / 2;
      lmZoom(e.deltaY < 0 ? 1.2 : 0.833, ox, oy);
    }, { passive: false });

    lbMapContainer.addEventListener("mousedown", (e) => {
      lmDrag=true; lmDidDrag=false; lmLX=e.clientX; lmLY=e.clientY;
      lbMapContainer.style.cursor="grabbing"; e.preventDefault();
    });
    document.addEventListener("mousemove", (e) => {
      if (!lmDrag) return;
      if (Math.abs(e.clientX-lmLX)>2||Math.abs(e.clientY-lmLY)>2) lmDidDrag=true;
      lmTx+=e.clientX-lmLX; lmTy+=e.clientY-lmLY; lmLX=e.clientX; lmLY=e.clientY;
      lmClamp(); lmApply();
    });
    document.addEventListener("mouseup", () => {
      if (lmDrag) { lmDrag=false; lbMapContainer.style.cursor="grab"; }
    });

    let lmTouches=[], lmLastPinch=0;
    lbMapContainer.addEventListener("touchstart", (e) => {
      lmTouches=[...e.touches];
      if (lmTouches.length===1){ lmLX=lmTouches[0].clientX; lmLY=lmTouches[0].clientY; lmDidDrag=false; }
      else if(lmTouches.length===2) lmLastPinch=Math.hypot(lmTouches[1].clientX-lmTouches[0].clientX,lmTouches[1].clientY-lmTouches[0].clientY);
      e.preventDefault();
    }, { passive:false });
    lbMapContainer.addEventListener("touchmove", (e) => {
      if(e.touches.length===1){
        lmTx+=e.touches[0].clientX-lmLX; lmTy+=e.touches[0].clientY-lmLY;
        lmLX=e.touches[0].clientX; lmLY=e.touches[0].clientY; lmDidDrag=true;
        lmClamp(); lmApply();
      } else if(e.touches.length===2){
        const dist=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY);
        const rect=lbMapContainer.getBoundingClientRect();
        const ox=(e.touches[0].clientX+e.touches[1].clientX)/2-rect.left-lbMapContainer.offsetWidth/2;
        const oy=(e.touches[0].clientY+e.touches[1].clientY)/2-rect.top-lbMapContainer.offsetHeight/2;
        lmZoom(dist/lmLastPinch,ox,oy); lmLastPinch=dist;
      }
      e.preventDefault();
    }, { passive:false });

    document.getElementById("lb-map-zoom-in").addEventListener("click",    () => lmZoom(1.3,0,0));
    document.getElementById("lb-map-zoom-out").addEventListener("click",   () => lmZoom(0.77,0,0));
    document.getElementById("lb-map-zoom-reset").addEventListener("click", lmReset);

    let _trendingLoaded  = false;
    let _trendingVisible = false;
    let _cfData    = [];
    let _cfIndex   = 0;
    let _cfRenderer  = null;
    let _cfCamera    = null;
    let _cfRafId     = null;
    let _cfMeshes    = [];
    let _cfTargets   = [];
    let _cfPaused    = false;
    let _cfDepartGen = 0;
    let _cfDepart    = { idx: -1, target: null };

    // Scattered layout: big center + thumbnails floating around it
    const CF_SLOTS = [
      { x:  0,    y:  0,    z:  0,    ry:  0,     rz:  0,     sc: 1    },  // 0 active
      { x:  3.6,  y:  0.2,  z: -0.5,  ry: -0.08,  rz: -0.06,  sc: 0.38 },  // +1 right
      { x:  5.8,  y: -0.8,  z: -1.2,  ry: -0.14,  rz: -0.10,  sc: 0.28 },  // +2 right-low
      { x:  2.2,  y:  2.6,  z: -1.0,  ry: -0.06,  rz:  0.09,  sc: 0.30 },  // +3 top-right
      { x:  4.8,  y:  2.1,  z: -1.8,  ry: -0.10,  rz: -0.07,  sc: 0.23 },  // +4 top-far
      { x: -3.6,  y:  0.2,  z: -0.5,  ry:  0.08,  rz:  0.06,  sc: 0.38 },  // -1 left
      { x: -5.8,  y: -0.8,  z: -1.2,  ry:  0.14,  rz:  0.10,  sc: 0.28 },  // -2 left-low
      { x: -2.2,  y:  2.6,  z: -1.0,  ry:  0.06,  rz: -0.09,  sc: 0.30 },  // -3 top-left
    ];
    const CF_OPS = [1, 0.88, 0.68, 0.58, 0.40, 0.88, 0.68, 0.58];

    function _cfSlotFor(off) {
      if (off === 0)              return CF_SLOTS[0];
      if (off >= 1 && off <= 4)  return CF_SLOTS[off];
      if (off === -1)             return CF_SLOTS[5];
      if (off === -2)             return CF_SLOTS[6];
      if (off === -3)             return CF_SLOTS[7];
      return null;
    }
    function _cfOpFor(off) {
      if (off === 0)             return CF_OPS[0];
      if (off >= 1 && off <= 4) return CF_OPS[off];
      if (off === -1)            return CF_OPS[5];
      if (off === -2)            return CF_OPS[6];
      if (off === -3)            return CF_OPS[7];
      return 0;
    }

    function _cfSyncTargets() {
      _cfMeshes.forEach((mesh, i) => {
        if (_cfDepart.idx === i && _cfDepart.target) {
          _cfTargets[i] = { ..._cfDepart.target };
          mesh.renderOrder = 30;
          return;
        }
        const off  = i - _cfIndex;
        const slot = _cfSlotFor(off);
        mesh.renderOrder = slot ? Math.max(0, 10 - Math.abs(off)) : 0;
        _cfTargets[i] = slot
          ? { x: slot.x, y: slot.y, z: slot.z, ry: slot.ry, rz: slot.rz, sc: slot.sc, op: _cfOpFor(off) }
          : { x: _cfTargets[i]?.x ?? 0, y: -20, z: -80, ry: 0, rz: 0, sc: 0.01, op: 0 };
      });
    }

    function _cfSnap() {
      _cfMeshes.forEach((mesh, i) => {
        const t = _cfTargets[i];
        mesh.position.set(t.x, t.y, t.z);
        mesh.rotation.y = t.ry;
        mesh.rotation.z = t.rz ?? 0;
        mesh.scale.setScalar(t.sc);
        mesh.material.opacity = t.op;
      });
    }

    function _cfUpdateUI() {
      const cur = _cfData[_cfIndex];
      if (!cur) return;
      document.getElementById("cf-title").textContent = cur.titulo;
      document.getElementById("cf-sub").textContent   = `${cur.juego} · ${cur.visitas || 0} visitas`;
      document.getElementById("cf-prev").disabled = _cfIndex === 0;
      document.getElementById("cf-next").disabled = _cfIndex === _cfData.length - 1;
      document.querySelectorAll(".cf-dot").forEach((d, i) =>
        d.classList.toggle("active", i === _cfIndex)
      );
    }

    function buildCoverflow(imgs) {
      _cfData  = imgs;
      _cfIndex = 0;

      if (_cfRafId)    { cancelAnimationFrame(_cfRafId); _cfRafId = null; }
      if (_cfRenderer) { _cfRenderer.dispose(); _cfRenderer = null; }
      _cfMeshes  = [];
      _cfTargets = [];
      _cfDepart  = { idx: -1, target: null };

      const stage   = document.getElementById("cf-stage");
      stage.innerHTML = "";

      const mobile = window.innerWidth < 640;
      const W = stage.clientWidth || (mobile ? 340 : 780);
      const H = mobile ? 300 : 520;
      stage.style.height = H + "px";

      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(W, H);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setClearColor(0x000000, 0);
      renderer.sortObjects = true;
      stage.appendChild(renderer.domElement);
      _cfRenderer = renderer;

      const scene = new THREE.Scene();

      const cam = new THREE.PerspectiveCamera(52, W / H, 0.1, 50);
      cam.position.set(0, 0, mobile ? 5 : 7);
      cam.lookAt(0, 0, 0);
      _cfCamera = cam;

      const BW = mobile ? 2.8 : 5.4;
      const BH = mobile ? 2.1 : 4.05;
      const loader = new THREE.TextureLoader();

      imgs.forEach((img) => {
        const mat  = new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, depthWrite: false });
        const mesh = new THREE.Mesh(new THREE.PlaneGeometry(BW, BH), mat);
        mesh.position.set(0, -20, -80);
        scene.add(mesh);
        _cfMeshes.push(mesh);
        _cfTargets.push({ x: 0, y: -20, z: -80, ry: 0, rz: 0, sc: 0.01, op: 0 });
        loader.load(img.filename, (tex) => {
          tex.colorSpace = THREE.SRGBColorSpace;
          mat.map = tex;
          mat.needsUpdate = true;
        });
      });

      _cfSyncTargets();
      _cfSnap();
      _cfUpdateUI();

      // Dots
      const dotsEl = document.getElementById("cf-dots");
      dotsEl.innerHTML = imgs.map((_, i) =>
        `<div class="cf-dot${i === 0 ? " active" : ""}" data-idx="${i}"></div>`
      ).join("");
      dotsEl.querySelectorAll(".cf-dot").forEach(dot =>
        dot.addEventListener("click", () => goToCf(parseInt(dot.dataset.idx)))
      );

      // Arrows
      document.getElementById("cf-prev").onclick = () => goToCf(_cfIndex - 1);
      document.getElementById("cf-next").onclick = () => goToCf(_cfIndex + 1);

      // Keyboard
      document.addEventListener("keydown", (e) => {
        if (!_trendingVisible) return;
        if (e.key === "ArrowLeft")  goToCf(_cfIndex - 1);
        if (e.key === "ArrowRight") goToCf(_cfIndex + 1);
      });

      // Click/tap on canvas → raycaster
      const ray = new THREE.Raycaster();
      renderer.domElement.addEventListener("click", (e) => {
        const r   = renderer.domElement.getBoundingClientRect();
        ray.setFromCamera({
          x:  ((e.clientX - r.left) / r.width)  * 2 - 1,
          y: -((e.clientY - r.top)  / r.height) * 2 + 1,
        }, cam);
        const hits = ray.intersectObjects(_cfMeshes);
        if (!hits.length) return;
        const hi = _cfMeshes.indexOf(hits[0].object);
        if (hi - _cfIndex === 0) {
          fetchImagen(_cfData[hi].id).then(full => {
            document.getElementById("trending-toggle-btn").click();
            openLightbox(full);
          }).catch(() => {});
        } else {
          goToCf(hi);
        }
      });

      // Touch swipe
      let _tx0 = null;
      renderer.domElement.addEventListener("touchstart", e => { _tx0 = e.touches[0].clientX; }, { passive: true });
      renderer.domElement.addEventListener("touchend",   e => {
        if (_tx0 === null) return;
        const dx = e.changedTouches[0].clientX - _tx0;
        if (Math.abs(dx) > 38) goToCf(_cfIndex + (dx < 0 ? 1 : -1));
        _tx0 = null;
      }, { passive: true });

      // Resize
      window.addEventListener("resize", _cfOnResize);

      // Render loop
      _cfPaused = false;
      (function tick() {
        _cfRafId = requestAnimationFrame(tick);
        if (_cfPaused) return;
        const L = 0.07;
        _cfMeshes.forEach((mesh, i) => {
          const t = _cfTargets[i];
          mesh.position.x         += (t.x  - mesh.position.x)         * L;
          mesh.position.y         += (t.y  - mesh.position.y)         * L;
          mesh.position.z         += (t.z  - mesh.position.z)         * L;
          mesh.rotation.y         += (t.ry          - mesh.rotation.y)  * L;
          mesh.rotation.z         += ((t.rz ?? 0)   - mesh.rotation.z)  * L;
          mesh.scale.x            += (t.sc - mesh.scale.x)              * L;
          mesh.scale.y            += (t.sc - mesh.scale.y)              * L;
          mesh.material.opacity   += (t.op - mesh.material.opacity)     * L;
        });
        renderer.render(scene, cam);
      })();
    }

    function _cfOnResize() {
      if (!_cfRenderer || !_cfCamera) return;
      const stage = document.getElementById("cf-stage");
      if (!stage) return;
      const mobile = window.innerWidth < 640;
      const W = stage.clientWidth;
      const H = mobile ? 300 : 520;
      stage.style.height = H + "px";
      _cfRenderer.setSize(W, H);
      _cfCamera.aspect = W / H;
      _cfCamera.updateProjectionMatrix();
    }

    function goToCf(newIdx) {
      newIdx = Math.max(0, Math.min(_cfData.length - 1, newIdx));
      if (newIdx === _cfIndex) return;

      const goingNext = newIdx > _cfIndex;
      _cfDepart.idx    = _cfIndex;
      _cfDepart.target = goingNext
        ? { x: -7,  y: -1.5, z: -2, ry: 0.15,  rz:  0.20, sc: 0.10, op: 0 }
        : { x:  7,  y: -1.5, z: -2, ry: -0.15, rz: -0.20, sc: 0.10, op: 0 };

      _cfIndex = newIdx;
      _cfSyncTargets();
      _cfUpdateUI();

      const gen = ++_cfDepartGen;
      const di  = _cfDepart.idx;
      setTimeout(() => {
        if (_cfDepartGen !== gen) return;
        const m = _cfMeshes[di];
        if (m) { m.position.set(0, -20, -80); m.material.opacity = 0; m.scale.setScalar(0.01); }
        _cfDepart = { idx: -1, target: null };
        _cfSyncTargets();
      }, 720);
    }

    async function loadTrending() {
      if (_trendingLoaded) return;
      try {
        const imgs = await fetchTrending(12);
        _trendingLoaded = true;
        if (!imgs.length) {
          document.getElementById("trending-panel").innerHTML =
            '<div class="state-box"><span class="state-icon">🏎</span><p>Sin datos de trending aún.</p></div>';
          return;
        }
        buildCoverflow(imgs);
      } catch {}
    }

    document.getElementById("trending-toggle-btn").addEventListener("click", async () => {
      const btn     = document.getElementById("trending-toggle-btn");
      const panel   = document.getElementById("trending-panel");
      const gallery = document.getElementById("gallery");
      const sentinel = document.getElementById("gallery-sentinel");
      const search  = document.querySelector(".search-bar");
      const filters = document.querySelector(".filter-bar");
      const tagBar  = document.getElementById("tag-filter-bar");

      _trendingVisible = !_trendingVisible;

      if (_trendingVisible) {
        btn.classList.add("active");
        btn.textContent = "← Galería";
        panel.style.display = "block";
        gallery.style.display = "none";
        sentinel.style.display = "none";
        search.style.display = "none";
        filters.style.display = "none";
        tagBar.style.display = "none";
        document.getElementById("count-label").style.display = "none";
        await loadTrending();
        _cfPaused = false;
      } else {
        btn.classList.remove("active");
        btn.textContent = "🔥 Trending";
        _cfPaused = true;
        panel.style.display = "none";
        gallery.style.display = "";
        sentinel.style.display = "";
        search.style.display = "";
        filters.style.display = "";
        document.getElementById("count-label").style.display = "";
        updateFilterBar();
      }
    });

    let _searchTimer = null;
    document.getElementById("gallery-search").addEventListener("input", (e) => {
      clearTimeout(_searchTimer);
      _searchTimer = setTimeout(() => {
        currentSearch = e.target.value.trim().toLowerCase();
        loadGallery();
      }, 300);
    });

    const _openId = _params.get("id");
    loadUser().then(async () => {
      if (currentUser) {
        document.getElementById("mis-fotos-btn").style.display = "";
        document.getElementById("mis-fotos-divider").style.display = "";
      }
      await loadGallery();
      if (_openId) {
        try { const img = await fetchImagen(_openId); openLightbox(img); } catch {}
      }
    });
  </script>
</body>
</html>
